<script>
    const paraTexts = [
        "Clean and modern web applications.",
        "Fullstack systems with great UX.",
        "Creative UI/UX experiences."
    ];

    const paraElement = document.getElementById("paraType");

    let pIndex = 0;
    let pChar = 0;
    let pDeleting = false;
    let pSpeed = 80;

    function typeParagraph() {
        const currentText = paraTexts[pIndex];

        if (pDeleting) {
            paraElement.textContent = currentText.substring(0, pChar - 1);
            pChar&#45;&#45;;
            pSpeed = 40;
        } else {
            paraElement.textContent = currentText.substring(0, pChar + 1);
            pChar++;
            pSpeed = 80;
        }

        if (!pDeleting && pChar === currentText.length) {
            pDeleting = true;
            pSpeed = 2000;
        }
        else if (pDeleting && pChar === 0) {
            pDeleting = false;
            pIndex = (pIndex + 1) % paraTexts.length;
            pSpeed = 500;
        }

        setTimeout(typeParagraph, pSpeed);
    }

    setTimeout(typeParagraph, 2000);
</script>
